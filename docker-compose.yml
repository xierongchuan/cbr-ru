version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        image: cbr-php:8.3
        container_name: cbr-app
        env_file: .env
        volumes:
            - .:/var/www/html:z
        depends_on:
            - mysql
            - redis
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://nginx/up || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
        networks:
            - cbrnet
        extra_hosts:
            - "host.docker.internal:host-gateway"

    nginx:
        image: nginx:stable
        container_name: cbr-nginx
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html:z
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:z
        depends_on:
            - app
        networks:
            - cbrnet

    mysql:
        image: mysql:8.0
        container_name: cbr-mysql
        env_file: .env
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - dbdata:/var/lib/mysql:z
        ports:
            - "3306:3306"
        networks:
            - cbrnet

    redis:
        image: redis:8.6
        container_name: cbr-redis
        volumes:
            - redisdata:/data:z
        ports:
            - "6379:6379"
        networks:
            - cbrnet

volumes:
    dbdata:
    redisdata:


networks:
    cbrnet:
        driver: bridge
